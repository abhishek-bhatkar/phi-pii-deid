name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm pack
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: gh release create "$GITHUB_REF_NAME" phi-pii-deid-*.tgz --title "phi-pii-deid $GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
